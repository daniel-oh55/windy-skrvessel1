<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Global Vessel Tracker - Final Fix</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #111; }
        #windy { width: 100vw; height: 100vh; }
        #status-msg {
            position: absolute; top: 10px; left: 10px; z-index: 10000;
            background: rgba(0,0,0,0.9); color: #00ffcc; padding: 15px;
            border: 1px solid #00ffcc; font-family: sans-serif; border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="status-msg">🛰️ 서버 연결 시도 중...</div>
    <div id="windy"></div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@windycom/leaflet-v4@0.2.1/dist/index.js"></script>

    <script>
        const statusEl = document.getElementById('status-msg');

        // 스크립트 로드 확인을 위한 로그
        console.log("스크립트 로딩 시도...");

        window.onload = function() {
            // windyInit이 존재하는지 1초 간격으로 최대 5번 체크하는 안전장치
            let retryCount = 0;
            const checkWindy = setInterval(() => {
                if (typeof windyInit !== 'undefined') {
                    clearInterval(checkWindy);
                    startVesselTracker();
                } else {
                    retryCount++;
                    statusEl.innerText = `연결 재시도 중... (${retryCount}/5)`;
                    if (retryCount >= 5) {
                        clearInterval(checkWindy);
                        statusEl.innerHTML = "<span style='color:red'>❌ 라이브러리 로드 실패. <br>주소를 직접 확인하거나 네트워크 차단을 확인하세요.</span>";
                    }
                }
            }, 1000);
        };

        function startVesselTracker() {
            const options = {
                // 사용자님의 API Key를 그대로 사용합니다.
                key: 'ZubTMFcvKH87utliHssmxu0MzssuX6oI', 
                lat: 34.5,
                lon: 128.0,
                zoom: 5,
            };

            windyInit(options, (windyAPI) => {
                const { map, store } = windyAPI;
                statusEl.innerText = "🚢 실시간 선박 모니터링 가동";
                
                // 파도 레이어 켜기
                store.set('overlay', 'waves');

                // 선박 표시
                L.marker([34.5, 128.0]).addTo(map).bindTooltip("PACIFIC-STAR (운항중)").openTooltip();
                
                setTimeout(() => statusEl.style.fadeOut = 1000, 3000);
            });
        }
    </script>
</body>
</html>
