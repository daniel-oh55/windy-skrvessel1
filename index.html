<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@windycom/leaflet-v4"></script>
    <style>#windy { width: 100%; height: 500px; background: #eee; }</style>
</head>
<body>
    <div id="windy">지도를 불러오는 중...</div>
    <script>
        window.onload = function() {
            if (typeof windyInit === 'undefined') {
                alert("네트워크에서 Windy 서버를 차단하고 있습니다!");
            } else {
                const options = {
                    key: 'ZubTMFcvKH87utliHssmxu0MzssuX6oI',
                    lat: 34.5, lon: 128.0, zoom: 5
                };
                windyInit(options, (windyAPI) => {
                    alert("성공! 지도가 로드되었습니다.");
                });
            }
        };
    </script>
</body>
</html>
